<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
        </marker>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
        </filter>
    </defs>
    
    <!-- 标题 -->
    <text x="400.0" y="60" text-anchor="middle" fill="#333" font-size="28" font-weight="bold">
        光合作用过程
    </text>
    
    <!-- 流程步骤 -->
    
    <defs>
        <linearGradient id="grad_0" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.9" />
            <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:0.6" />
        </linearGradient>
    </defs>
    <rect x="32.0" y="200" width="160" height="80" rx="12" 
          fill="url(#grad_0)" stroke="#4CAF50" stroke-width="2">
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.0s" fill="freeze"/>
    </rect>
    <text x="112.0" y="246.0" 
          text-anchor="middle" fill="white" font-size="16" font-weight="bold">
        光能吸收
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.0s" fill="freeze"/>
    </text>

    <defs>
        <linearGradient id="grad_1" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#2196F3;stop-opacity:0.9" />
            <stop offset="100%" style="stop-color:#2196F3;stop-opacity:0.6" />
        </linearGradient>
    </defs>
    <rect x="224.0" y="200" width="160" height="80" rx="12" 
          fill="url(#grad_1)" stroke="#2196F3" stroke-width="2">
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.2s" fill="freeze"/>
    </rect>
    <text x="304.0" y="246.0" 
          text-anchor="middle" fill="white" font-size="16" font-weight="bold">
        水分解
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.2s" fill="freeze"/>
    </text>

    <defs>
        <linearGradient id="grad_2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FF9800;stop-opacity:0.9" />
            <stop offset="100%" style="stop-color:#FF9800;stop-opacity:0.6" />
        </linearGradient>
    </defs>
    <rect x="416.0" y="200" width="160" height="80" rx="12" 
          fill="url(#grad_2)" stroke="#FF9800" stroke-width="2">
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.4s" fill="freeze"/>
    </rect>
    <text x="496.0" y="246.0" 
          text-anchor="middle" fill="white" font-size="16" font-weight="bold">
        氧气释放
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.4s" fill="freeze"/>
    </text>

    <defs>
        <linearGradient id="grad_3" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#E91E63;stop-opacity:0.9" />
            <stop offset="100%" style="stop-color:#E91E63;stop-opacity:0.6" />
        </linearGradient>
    </defs>
    <rect x="608.0" y="200" width="160" height="80" rx="12" 
          fill="url(#grad_3)" stroke="#E91E63" stroke-width="2">
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.6000000000000001s" fill="freeze"/>
    </rect>
    <text x="688.0" y="246.0" 
          text-anchor="middle" fill="white" font-size="16" font-weight="bold">
        有机物合成
        <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.6000000000000001s" fill="freeze"/>
    </text>

    
    <!-- 箭头 -->
    
    <path d="M 192.0 240.0 L 204.0 240.0" 
          stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)">
        <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.3s" fill="freeze"/>
    </path>

    <path d="M 384.0 240.0 L 396.0 240.0" 
          stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)">
        <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.5s" fill="freeze"/>
    </path>

    <path d="M 576.0 240.0 L 588.0 240.0" 
          stroke="#666" stroke-width="3" fill="none" marker-end="url(#arrowhead)">
        <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.7s" fill="freeze"/>
    </path>

    
    <!-- 底部说明 -->
    <text x="400.0" y="560" text-anchor="middle" fill="#999" font-size="14">
        模板驱动生成 • 质量稳定可靠
    </text>
</svg>