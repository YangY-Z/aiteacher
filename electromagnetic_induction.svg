<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
<!-- Physics Visualization - Electromagnetic Induction -->
<defs>
<linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#1a237e"/>
<stop offset="100%" stop-color="#283593"/>
</linearGradient>
<radialGradient id="northPoleGradient">
<stop offset="0%" stop-color="#ff1744"/>
<stop offset="100%" stop-color="#d50000"/>
</radialGradient>
<radialGradient id="southPoleGradient">
<stop offset="0%" stop-color="#2196f3"/>
<stop offset="100%" stop-color="#0d47a1"/>
</radialGradient>
<filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
  </filter>
<filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>
<rect width="100%" height="100%" fill="url(#bgGradient)"/>
<text x="500" y="50" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold">⚡ 电磁感应过程</text>
<g transform="translate(200, 200)">
<rect x="-60" y="-30" width="120" height="60" fill="url(#northPoleGradient)" rx="5" filter="url(#shadow)"/>
<text x="0" y="8" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">N极</text>
</g>
<g transform="translate(200, 400)">
<rect x="-60" y="-30" width="120" height="60" fill="url(#southPoleGradient)" rx="5" filter="url(#shadow)"/>
<text x="0" y="8" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">S极</text>
</g>
<path d="M 200 230 Q 350 300 200 370" stroke="#4fc3f7" stroke-width="3" fill="none" stroke-dasharray="8,4">
<animate attributeName="stroke-dashoffset" from="0" to="12" dur="1.5s" repeatCount="indefinite"/>
</path>
<path d="M 200 230 Q 450 320 200 370" stroke="#4fc3f7" stroke-width="3" fill="none" stroke-dasharray="8,4">
<animate attributeName="stroke-dashoffset" from="0" to="12" dur="1.5s" repeatCount="indefinite"/>
</path>
<ellipse cx="600" cy="300" rx="80" ry="100" fill="none" stroke="#ffa726" stroke-width="4" filter="url(#glow)"/>
<line x1="680" y1="300" x2="750" y2="300" stroke="#ff9800" stroke-width="4"/>
<polygon points="750,300 740,295 740,305" fill="#ff9800"/>
<text x="800" y="305" font-size="14" fill="#ff9800" text-anchor="middle">运动方向</text>
<circle cx="850" cy="200" r="50" fill="#00e676" filter="url(#shadow)">
    <animate attributeName="r" values="50;60;50" dur="2s" repeatCount="indefinite"/>
</circle>
<text x="850" y="195" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">感应</text>
<text x="850" y="215" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">电流</text>
<rect x="350" y="600" width="300" height="50" fill="#f5f5f5" rx="10"/>
<text x="500" y="632" font-size="20" fill="#333" text-anchor="middle" font-weight="bold">ε = -dΦ/dt</text>
</svg>