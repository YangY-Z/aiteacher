<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
<!-- Enhanced Layered Visualization System -->
<defs>
<linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#667eea"/>
<stop offset="100%" stop-color="#764ba2"/>
</linearGradient>
<radialGradient id="sunGradient">
<stop offset="0%" stop-color="#ffeb3b"/>
<stop offset="100%" stop-color="#ffa000"/>
</radialGradient>
<radialGradient id="leafGradient">
<stop offset="0%" stop-color="#81c784"/>
<stop offset="100%" stop-color="#4caf50"/>
</radialGradient>
<filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
  </filter>
</defs>
<rect width="100%" height="100%" fill="url(#bgGradient)"/>
<text x="500" y="50" font-size="28" fill="#ffffff" text-anchor="middle" font-weight="bold">🌿 光合作用过程</text>
<circle cx="120" cy="150" r="60" fill="url(#sunGradient)" filter="url(#shadow)">
    <animate attributeName="r" values="60;72.0;60" dur="2s" repeatCount="indefinite"/>
</circle>
<text x="120" y="155" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">太阳</text>
<text x="120" y="230" font-size="11" fill="#666" text-anchor="middle">光能</text>
<circle cx="120" cy="250" r="55" fill="#9e9e9e" filter="url(#shadow)">
    <animate attributeName="r" values="55;66.0;55" dur="2s" repeatCount="indefinite"/>
</circle>
<text x="120" y="255" font-size="16" fill="#333" text-anchor="middle" font-weight="bold">CO₂</text>
<text x="120" y="325" font-size="11" fill="#666" text-anchor="middle">碳源</text>
<circle cx="120" cy="350" r="55" fill="#2196f3" filter="url(#shadow)">
    <animate attributeName="r" values="55;66.0;55" dur="2s" repeatCount="indefinite"/>
</circle>
<text x="120" y="355" font-size="16" fill="#333" text-anchor="middle" font-weight="bold">H₂O</text>
<text x="120" y="425" font-size="11" fill="#666" text-anchor="middle">氢源、氧源</text>
<ellipse cx="500" cy="350" rx="140" ry="100" fill="url(#leafGradient)" stroke="#2e7d32" filter="url(#shadow)"/>
<text x="500" y="340" font-size="40" fill="#ffffff" text-anchor="middle">🍃</text>
<text x="500" y="380" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="bold">叶片</text>
<text x="500" y="410" font-size="12" fill="#e8f5e9" text-anchor="middle">叶绿体 | 气孔</text>
<circle cx="880" cy="150" r="50" fill="#4caf50" filter="url(#shadow)"/>
<text x="880" y="155" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">O₂</text>
<text x="880" y="220" font-size="11" fill="#666" text-anchor="middle">氧气</text>
<circle cx="880" cy="270" r="60" fill="#e91e63" filter="url(#shadow)"/>
<text x="880" y="275" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">葡萄糖</text>
<text x="880" y="350" font-size="11" fill="#666" text-anchor="middle">有机物</text>
<path d="M 165 150 Q 240.0 150 360 350" stroke="#ff9800" stroke-width="3" fill="none" stroke-dasharray="8,4"><animate attributeName="stroke-dashoffset" from="0" to="12" dur="1.5s" repeatCount="indefinite"/></path>
<path d="M 165 250 Q 240.0 250 360 350" stroke="#4caf50" stroke-width="3" fill="none" stroke-dasharray="8,4"><animate attributeName="stroke-dashoffset" from="0" to="12" dur="1.5s" repeatCount="indefinite"/></path>
<path d="M 165 350 Q 240.0 350 360 350" stroke="#666" stroke-width="3" fill="none" stroke-dasharray="8,4"><animate attributeName="stroke-dashoffset" from="0" to="12" dur="1.5s" repeatCount="indefinite"/></path>
<path d="M 640 350 Q 760.0 150 835 150" stroke="#4caf50" stroke-width="3" fill="none" stroke-dasharray="8,4"><animate attributeName="stroke-dashoffset" from="0" to="12" dur="1.5s" repeatCount="indefinite"/></path>
<path d="M 640 350 Q 760.0 270 835 270" stroke="#e91e63" stroke-width="3" fill="none" stroke-dasharray="8,4"><animate attributeName="stroke-dashoffset" from="0" to="12" dur="1.5s" repeatCount="indefinite"/></path>
<rect x="250" y="620" width="500" height="50" fill="#f5f5f5" rx="10"/>
<text x="500" y="652" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">6CO₂ + 6H₂O + 光能 → C₆H₁₂O₆ + 6O₂</text>
</svg>