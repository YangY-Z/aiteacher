<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试</title>
</head>
<body style="margin: 0; padding: 20px; background: #1a237e;">
    <svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
        <!-- 背景 -->
        <rect width="100%" height="100%" fill="#283593"/>
        
        <!-- 标题 -->
        <text x="400" y="40" font-size="24" fill="white" text-anchor="middle" font-weight="bold">⚡ 电磁感应过程</text>
        
        <!-- N极 -->
        <rect x="100" y="150" width="120" height="60" fill="#ff1744" rx="5"/>
        <text x="160" y="188" font-size="20" fill="white" text-anchor="middle" font-weight="bold">N极</text>
        
        <!-- S极 -->
        <rect x="100" y="350" width="120" height="60" fill="#2196f3" rx="5"/>
        <text x="160" y="388" font-size="20" fill="white" text-anchor="middle" font-weight="bold">S极</text>
        
        <!-- 磁感线 -->
        <path d="M 220 180 Q 350 270 220 380" stroke="#4fc3f7" stroke-width="3" fill="none"/>
        <path d="M 220 180 Q 400 300 220 380" stroke="#4fc3f7" stroke-width="3" fill="none"/>
        
        <!-- 线圈 -->
        <ellipse cx="500" cy="300" rx="80" ry="100" fill="none" stroke="#ffa726" stroke-width="4"/>
        
        <!-- 运动箭头 -->
        <line x1="580" y1="300" x2="650" y2="300" stroke="#ff9800" stroke-width="4"/>
        <polygon points="650,300 640,295 640,305" fill="#ff9800"/>
        <text x="700" y="305" font-size="14" fill="#ff9800" text-anchor="middle">运动方向</text>
        
        <!-- 感应电流 -->
        <circle cx="700" cy="180" r="40" fill="#00e676"/>
        <text x="700" y="175" font-size="14" fill="white" text-anchor="middle" font-weight="bold">感应</text>
        <text x="700" y="195" font-size="14" fill="white" text-anchor="middle" font-weight="bold">电流</text>
        
        <!-- 公式 -->
        <rect x="300" y="500" width="200" height="40" fill="#f5f5f5" rx="10"/>
        <text x="400" y="528" font-size="18" fill="#333" text-anchor="middle" font-weight="bold">ε = -dΦ/dt</text>
    </svg>
</body>
</html>
